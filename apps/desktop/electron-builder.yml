appId: com.cooperativ.overlord
productName: Overlord
artifactName: "${productName}-${version}-${os}-${arch}.${ext}"
directories:
  output: release
  buildResources: apps/desktop/electron/resources
afterSign: scripts/notarize.cjs

files:
  - "apps/desktop/dist-electron/**/*"
  - "packages/overlord-cli/**/*"
  - "plugins/overlord/**/*"
  - "plugins/claude/**/*"
  - "plugins/cursor/**/*"
  - "plugins/antigravity/**/*"
  - "!node_modules"

mac:
  target:
    - dmg
    - zip
  category: public.app-category.developer-tools
  icon: apps/web/public/images/512.png

linux:
  target:
    - AppImage
    - deb
  category: Development
  executableName: overlord
  icon: apps/web/public/images/512.png
  maintainer: Cooperativ, Inc. <jake@cooperativ.io>

deb:
  packageName: overlord
  compression: gz

asarUnpack:
  - "packages/overlord-cli/**/*"
  - "plugins/overlord/**/*"
  - "plugins/claude/**/*"
  - "plugins/cursor/**/*"
  - "plugins/antigravity/**/*"

electronFuses:
  enableEmbeddedAsarIntegrityValidation: true
  onlyLoadAppFromAsar: true

npmRebuild: false
