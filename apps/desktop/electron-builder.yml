appId: com.cooperativ.overlord
productName: Overlord
artifactName: "${productName}-${version}-${os}-${arch}.${ext}"
directories:
  output: release
  buildResources: apps/desktop/electron/resources
afterSign: scripts/notarize.cjs

files:
  - "apps/desktop/dist-electron/**/*"
  - "packages/overlord-cli/**/*"
  - "plugins/overlord/**/*"
  - "plugins/claude/**/*"
  - "plugins/cursor/**/*"
  - "!node_modules"

extraResources:
  - from: apps/desktop/electron/resources/remote-agent
    to: remote-agent
    filter:
      - "**/*"

mac:
  target:
    - dmg
    - zip
  category: public.app-category.developer-tools
  icon: apps/web/public/images/512.png

linux:
  target:
    - AppImage
    - deb
  category: Development
  icon: apps/web/public/images/512.png

asarUnpack:
  - "packages/overlord-cli/**/*"
  - "plugins/overlord/**/*"
  - "plugins/claude/**/*"
  - "plugins/cursor/**/*"

npmRebuild: true
