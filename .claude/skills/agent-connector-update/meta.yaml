description: Use when changing the Overlord CLI or how Overlord integrates with
  any agent connector (Claude Code, Codex, Cursor, Gemini CLI, OpenCode) —
  adding/removing protocol operations, changing flags or help text, modifying
  bundle/plugin install behavior, updating slash commands, or altering
  permission/hook wiring. Enforces source-template-first edits, generated plugin
  parity, and alignment across all protocol surfaces.
