appId: com.cooperativ.overlord
productName: Overlord
directories:
  output: release
  buildResources: electron/resources

files:
  - "dist-electron/**/*"
  - ".next/standalone/**/*"

mac:
  target:
    - dmg
    - zip
  category: public.app-category.developer-tools
  icon: public/images/512.png

linux:
  target:
    - AppImage
    - deb
  category: Development
  icon: public/images/512.png

asarUnpack:
  - "node_modules/node-pty/**/*"
  - ".next/standalone/**/*"

npmRebuild: true
