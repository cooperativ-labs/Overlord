appId: com.cooperativ.orchestrator
productName: Orchestrator
directories:
  output: release
  buildResources: electron/resources

files:
  - "dist-electron/**/*"
  - ".next/standalone/**/*"
  - ".next/static/**/*"
  - "public/**/*"
  - "supabase/config.toml"
  - "supabase/migrations/**/*"
  - "supabase/seed.sql"

mac:
  target:
    - dmg
    - zip
  category: public.app-category.developer-tools
  icon: electron/resources/icon.icns
  identity: null  # Skip code signing for local dev; remove this for distribution

linux:
  target:
    - AppImage
    - deb
  category: Development
  icon: electron/resources/icon.png

asarUnpack:
  - "node_modules/node-pty/**/*"

npmRebuild: true
